<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Classic Game Shuffle</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body style="background-color: #202020;">
	<div class="box">
		The Classic Game Shuffle requires javascript to be enabled. Please activate it and refresh the page.
	</div>
	<br>
	<div class="positionHelper"></div>
	<div class="gameSizeBox"></div>
	<div class="gameBox">
		<div class="pregame"><h1>You are Ret 2 Go!</h1><br>Please wait for the event coordinator to start the shuffler.</div>
		<canvas class="webGLCanvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
	</div>
	<div class="footer">
		<div class="footerLeft">Classic Game Shuffle v0.4 by HundterG</div>
		<div class="footerRight"><a href="https://github.com/HundterG/CustomGameShuffle" target="_blank">View on Github</a></div>
	</div>
	<script src="script.js"></script>
</body>
</html>
